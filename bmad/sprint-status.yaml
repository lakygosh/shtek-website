baseline:
  story_id: "0.1"
  title: "Capture analytics baseline & current performance metrics"
  epic: "Pre-Launch Prep"
  priority: P0
  complexity: S
  status: todo
  owner: ""
  due: Before Sprint 1
  description: |
    Capture baseline metrics before ANY implementation changes to enable post-launch measurement 
    of PRD success metrics (bounce rate -20%, time on page +40%, CTA CTR +50%). This must happen 
    first so that post-launch deltas are meaningful.
  
