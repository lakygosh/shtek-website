# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════
# RISK REGISTER
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════

risks:
  
  risk_1:
    title: "Mobile-first CSS migration risk"
    description: |
      Architecture Section 5.2 identifies this as "the most significant CSS change in the redesign."
      Rewriting all existing CSS from desktop-first (max-width) to mobile-first (min-width) touches 
      every component simultaneously. Risk: botched migration silently breaks desktop layouts while 
      fixing mobile ones.
    probability: "Medium"
    impact: "High"
    mitigation: |
      - Add explicit regression test matrix to Sprint 1 Story 1.3 (responsive grid)
      - Test all existing components at 375px, 768px, 1024px BEFORE moving to new sections
      - Screenshot baseline (desktop) before migration, compare after
    owner: "Dev team lead"
  
  risk_2:
    title: "AnimatedDashboard mobile performance untested"
    description: |
      Dashboard is SVG-based (good for weight), but runs multiple CSS animations simultaneously.
      On mobile with limited GPU, this could cause LCP > 2.5s or battery drain.
    probability: "Medium"
    impact: "Medium"
    mitigation: |
      - Story 2.2 must include explicit mobile performance test (real device or throttling)
      - Monitor LCP specifically (hero headline LCP should not include animations)
      - Consider disabling non-critical animations (shimmer, float) on mobile if needed
    owner: "Story 2.2 assignee"
  
  risk_3:
    title: "External content dependencies block Sprint 4"
    description: |
      Three stories depend on Rajko delivering content:
      - Testimonials copy (Story 3.1 — P0, critical path)
      - Founder photo + copy (Story 3.4)
      - Pro tier confirmation (Story 3.2)
      If Rajko isn't engaged early, multiple stories block simultaneously.
    probability: "High"
    impact: "High"
    mitigation: |
      - Engagement with Rajko BEFORE Sprint 4 begins
      - Approved fallback content for testimonials ("Beta User, Belgrade")
      - Placeholder Pro tier price (can update later)
    owner: "Bob (Scrum Master) — escalate to Rajko"
  
  risk_4:
    title: "FR-08 Ideal Life Promo discovered missing mid-sprint"
    description: |
      With no original story, this P0 PRD requirement could be missed entirely until QA/review.
      Story 3.0 creates ownership, but coordination risk remains.
    probability: "Low"
    impact: "High"
    mitigation: |
      - Story 3.0 explicitly created in this sprint plan
      - Clear placement in App.jsx (between HowItWorks and Testimonials)
      - Tracked in this document as a critical story
    owner: "Bob (Scrum Master)"
  
  risk_5:
    title: "Comparison section has no UX spec"
    description: |
      Story 3.6 will be built from PRD table alone. No visual guidance on mobile layout 
      (cards vs table) or desktop design. Developer improvises.
    probability: "Medium"
    impact: "Medium"
    mitigation: |
      - Request UX spec from Sally before Sprint 4
      - Fallback: use Card component pattern for mobile, standard table on desktop
    owner: "Sally (UX) + Story 3.6 assignee"

