        accent border (3px), step number rings (56×56, accent border), stagger animations. Desktop: 
        horizontal flex with animated SVG connector line (drawLine, 1.5s). Add "Sign Up in 30 
        Seconds →" CTA below steps.
      
      acceptance_criteria:
        - Mobile: step cards stack vertically with 3px left border in --accent
        - Step number rings: 56×56px circles, --accent border, DM Mono text centered
        - Card titles: H3 styling
        - Card descriptions: Body S (small) text
        - Stagger animation on scroll: fadeInUp from bottom with 0.15s delays
