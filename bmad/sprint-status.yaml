        preserved copy, and accent-highlighted key word. Single fadeInUp animation on scroll entry. 
        Add CTA "Start Planning →" below. Font: clamp(1.5rem, 3.5vw, 2.2rem), weight 600.
      
      acceptance_criteria:
        - Section background: ambient gradient (different from Hero)
        - Content: max-width-text (760px) centered
        - Copy preserved verbatim: "Most apps track where your money went. Shtek helps you decide 
          where it should go."
        - Key word highlighted in --accent color
        - Single fadeInUp animation (not staggered) on scroll entry
        - Font: clamp(1.5rem, 3.5vw, 2.2rem), weight 600
