# SPRINT 3: Core Section Redesign - Part 2 (Epic 2: Stories 2.5–2.8)
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════

sprint_3:
  name: "Core Section Redesign — Part 2 (HowItWorks, Manifesto, FinalCTA, Footer)"
  epic: "Epic 2"
  goal: |
    Complete the core section redesign with the remaining above-the-fold sections (HowItWorks, Manifesto, 
    FinalCTA) plus the expanded Footer. These sections provide conversion path clarity and final CTAs.
  
  sprint_duration: "2 weeks"
  velocity_target: 18 points (3S + 1M)
  
  stories:
    
    - story_id: "2.5"
      title: "Redesign HowItWorks (3-step flow, vertical cards, connector line)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
