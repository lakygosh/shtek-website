    timing: "Before Sprint 4"
  
  action_2:
    title: "Create or resolve Terms of Service / Privacy Policy pages"
    details: |
      Story 2.8 Footer and Story 3.5 Privacy both link to pages that may not exist. Either:
      1. Create placeholder pages (simple HTML + CMS link), or
      2. Change footer links to something that exists (e.g., "Contact" instead of "Terms of Service")
      PRD Section 10 says full legal docs are out of scope, but stubs are needed to avoid broken links.
    priority: P1
    timing: "Before Sprint 3 (footer links go live)"
  
  action_3:
    title: "Confirm hosting platform (Vercel/Netlify/Cloudflare/other)"
    details: |
      Architecture has cache/deployment strategy but no platform-specific config file. 
      Needed: vercel.json (Vercel), netlify.toml (Netlify), _headers (Cloudflare), etc.
    priority: P1
    timing: "Before Sprint 6"
  
  action_4:
    title: "Resolve copyright year (UX says 2025, all others say 2026)"
    details: |
      UX spec footer shows "© 2025 Shtek." All implementation docs say "© 2026 Shtek."
      Standardize to 2026 across all documents.
    priority: P2
    timing: "Before Sprint 3 (footer release)"

