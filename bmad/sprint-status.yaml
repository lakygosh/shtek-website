# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════
# SPRINT 1: Foundation & Design System (Epic 1)
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════

sprint_1:
  name: "Foundation & Design System"
  epic: "Epic 1"
  goal: |
    Establish the shared design infrastructure (CSS tokens, reusable components, responsive grid, 
    animation utilities) that all subsequent epics depend on. This sprint is a technical enabler — 
    shipping Sprint 1 unblocks parallel work on Epics 2 and 3.
  
  sprint_duration: "2 weeks"
  velocity_target: 18 points (4S + 1M)
  
  stories:
    
    - story_id: "1.1"
      title: "Set up CSS custom properties (design tokens)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement the full CSS token system covering colors, typography, spacing, and radius tokens.
        This extends the existing :root variables in src/index.css with new semantic tokens from the 
        UX Design Spec. Also includes directory restructuring and font self-hosting setup (was ADR-05).
      
      acceptance_criteria:
        - All color tokens present: --bg-base, --bg-elevated, --bg-card, --bg-input, --bg-overlay, 
          --border-subtle, --border-default, --border-hover, --border-focus, --text-primary, 
          --text-secondary, --text-muted, --text-dim, --text-disabled, --accent, --accent-light, 
          --accent-dim, --accent-glow, --accent-surface, --secondary, --secondary-dim, 
          --secondary-surface, --info, --info-dim, --error, --error-dim, --gold, --gold-dim
        - Spacing tokens present: --space-1 through --space-24 (4px increments)
        - Border radius tokens present: --radius-xs, --radius-sm, --radius, --radius-lg, 
          --radius-xl, --radius-full
        - Typography tokens present: --max-width, --max-width-text, --max-width-narrow
        - DM Sans (400, 500, 600, 700) and DM Mono (400, 500) self-hosted as WOFF2 files 
          in public/fonts/ with @font-face declarations using font-display: swap
        - Google Fonts CDN link removed from index.html
        - Existing color variables preserved for backward compatibility
        - Directory structure created: src/components/ui/, src/components/layout/, 
          src/components/sections/, src/components/mocks/, src/data/, src/hooks/, src/utils/
      
      blockers: []
      
      dependencies: []
      
      definition_of_done:
        - All tokens render correctly in browser (inspect :root computed styles)
        - Fonts load with swap strategy (no FOIT, no FOUT)
        - Font files bundled in dist/fonts/
        - All imports in other components resolve
    
    
    - story_id: "1.2"
      title: "Create shared components (Button, Card, Section, Badge, Accordion)"
      complexity: M
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Build the core shared component library as React components with co-located CSS. These are 
        primitive building blocks used across multiple sections. Components: Button (variants: primary, 
        secondary/ghost, outline-accent, icon; sizes: default, lg, xl; full-width prop), Card (variants: 
        standard, feature, pricing, testimonial, stat; hover behavior), Section (intersection observer 
        wrapper), Badge (free, beta, new, premium), Accordion (single/group variants, keyboard accessible).
      
      acceptance_criteria:
        - Button component renders all variants and sizes; applies correct token colors; 
          has minimum 44px touch target; implements shimmer animation
        - Card component renders all variants; features variant has accent border + glow; 
          pricing featured has accent surface background
        - Badge component renders all variants; free badge uses accent-dim background
        - Section wrapper component renders with useIntersectionObserver hook; 
          applies .visible class when 15% in viewport
        - Accordion component: single/group toggle modes; chevron rotation; smooth height animation; 
          aria-expanded + aria-controls attributes set correctly; keyboard operable (Enter/Space/Escape)
        - All components accept children and style props
        - CSS modules or scoped styles (not global class pollution)
        - Focus indicators use --border-focus color
      
      blockers: []
      
      dependencies:
        - "1.1 (design tokens must exist)"
      
      definition_of_done:
        - All components render without console errors
        - Storybook or visual regression test suite created (optional but recommended)
        - All components tested in mobile (375px) and desktop (1024px+) viewports
    
    
    - story_id: "1.3"
      title: "Implement mobile-first responsive grid/layout system"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Define the responsive layout utilities using CSS Grid and Flexbox with consistent breakpoints.
        Codify breakpoint values (320px, 480px, 768px, 1024px, 1440px) as CSS custom properties.
        Create layout helper classes for column patterns used across the site: 1-col → 2-col → 3-col, 
        hero split (1fr 1fr), features split (1fr 1.2fr), 4-col footer.
      
      acceptance_criteria:
        - Breakpoint variables defined: --bp-xs (320px), --bp-sm (480px), --bp-md (768px), 
          --bp-lg (1024px), --bp-xl (1440px)
        - All media queries use min-width (mobile-first, never max-width)
        - 2-col grid pattern: 1-col at 375px, 2-col at 768px+, full-width with no overflow at 375px
        - Hero split layout: vertical stack at 375px, 1fr 1fr side-by-side at 1024px+
        - Features split layout: 1-col at 375px (mock above text), 1fr 1.2fr at 768px+
        - 4-col footer: stacked at 375px, 2-col at 768px, 4-col at 1024px
        - All layouts constrained to --max-width (1200px) at 1440px+ with no horizontal scroll
        - Container component centers content and applies consistent padding at all breakpoints
      
      blockers: []
      
      dependencies:
        - "1.1 (spacing tokens via --space-* variables)"
      
      definition_of_done:
        - No horizontal scrollbar at any viewport width (320px–1440px+)
        - All grid gaps and padding use token variables
        - Mobile-first CSS migration complete (no max-width queries anywhere)
    
    
    - story_id: "1.4"
      title: "Set up animation utilities (intersection observer, transitions, hooks)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Formalize and extend the existing animation system. Add new hooks (useMediaQuery, 
        useScrollPosition) and keyframes (accordionOpen, counterUp, cardHover). Ensure 
        prefers-reduced-motion compliance. Document stagger delay pattern (100ms increments).
      
      acceptance_criteria:
        - useIntersectionObserver hook: triggers .visible class at 15% threshold; 
          no re-triggers (unobserve on first intersection)
        - useCountUp hook: animates numeric values from 0 to target; 0.8s duration; 
          ease-out easing; triggered by shouldStart flag
        - useMediaQuery hook: returns boolean for CSS media queries; used for responsive conditionals
        - useScrollPosition hook: returns current scroll Y position (throttled to 16ms); 
          used by Navbar for glass transition
        - All scroll animations disabled or simplified (≤100ms) when prefers-reduced-motion: reduce
        - New keyframes: @keyframes accordionOpen, @keyframes counterUp, @keyframes cardHover
        - All existing keyframes preserved: fadeInUp, fadeIn, scaleIn, shimmer, gradientMove, 
          barGrow, drawLine, ringDraw, float, pulseGlow, slideEntry
        - Stagger delay pattern documented: 100-150ms between list items
      
      blockers: []
      
      dependencies:
        - "1.1 (tokens for animation values)"
      
      definition_of_done:
        - All hooks exported from src/hooks/
        - All keyframes tested in the browser
        - prefers-reduced-motion test: set OS setting, verify animations disable
    
    
    - story_id: "1.5"
      title: "Complete directory structure and data file scaffolding"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Set up the remaining directory structure and create empty/template data files.
        Create static data files for sections with substantial content: features.js, testimonials.js, 
        faq.js, pricing.js, steps.js, trustItems.js, navigation.js. Create utils for CTAUrl pattern 
        and SEO helpers. Create public/ static files (og-image.png placeholder, sitemap.xml, robots.txt).
      
      acceptance_criteria:
        - All directories from Architecture Section 4.1 created: components/ui/, components/layout/, 
          components/sections/, components/mocks/, hooks/, data/, utils/
        - Data files created with placeholder exports: data/features.js, data/testimonials.js, 
          data/faq.js, data/pricing.js, data/steps.js, data/trustItems.js, data/navigation.js
        - utils/links.js created with ctaUrl(section) function: returns 
          "https://app.shtek.me/?utm_source=landing&utm_medium=cta&utm_campaign={section}"
        - utils/seo.js created with structured data generators (FAQPage, SoftwareApplication schemas)
        - public/og-image.png placeholder (1200×630) created
        - public/sitemap.xml template created (will be populated by sprint 4.2)
        - public/robots.txt template created (will be populated by sprint 4.2)
        - All imports in App.jsx resolve (no 404 errors)
      
      blockers: []
      
      dependencies:
        - "1.1 (directory structure)"
      
      definition_of_done:
        - No import errors in console when app starts
        - All utility functions exported and importable
        - Data files have correct structure for their sections
  
  definition_of_done:
    - All 5 stories merged to main
    - No console errors or warnings
    - Lighthouse baseline run (metrics captured)
    - No visual changes to existing sections (if applied to existing codebase)
    - Ready to unblock Epics 2 and 3 in parallel

---
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════
# SPRINT 2: Core Section Redesign - Part 1 (Epic 2: Stories 2.1–2.4)
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════

sprint_2:
  name: "Core Section Redesign — Part 1 (Navbar, Hero, TrustBar, Features)"
  epic: "Epic 2"
  goal: |
    Redesign the 4 critical above-the-fold sections (Navbar, Hero, TrustBar, Features) to be 
    mobile-first and conversion-optimized. These sections have the highest visitor impact and 
    establish the visual language for the entire site.
  
  sprint_duration: "2 weeks"
  velocity_target: 20 points (2M + 2L)
  
  stories:
    
    - story_id: "2.1"
      title: "Redesign Navbar (sticky, mobile hamburger, scroll behavior)"
      complexity: M
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement sticky navigation bar with scroll-triggered glass morphism effect, mobile hamburger 
        menu, active section highlighting via Intersection Observer. Mobile: 56px tall, logo + hamburger, 
        slide-down full-width menu. Desktop: logo + nav links + CTA button. Scroll behavior: 
        transparent → backdrop-blur + border after 80px.
      
      acceptance_criteria:
        - Navbar height: 56px on mobile
        - Mobile: hamburger icon visible; 3-line to X animation; full-width slide-down menu
        - Mobile menu: items (Features, How it Works, Pricing, FAQ) with 52px touch targets; 
          full-width primary CTA at bottom
        - Desktop: logo, nav links, CTA button in horizontal layout
        - Scroll behavior: transparent initially, glass morphism (backdrop-filter: blur + border) 
          after 80px scroll
        - Active section highlighting: Intersection Observer updates nav link color to --accent
        - Mobile hamburger menu focus trap: Tab cycles within menu only when open; Escape closes
        - "Start Free →" CTA links to app.shtek.me with utm_campaign=navbar UTM params
      
      blockers: []
      
      dependencies:
        - "1.1, 1.2, 1.3 (design tokens, Button component, responsive grid)"
      
      definition_of_done:
        - Navbar sticky and responsive at 375px, 768px, 1024px viewports
        - Menu opens/closes smoothly
        - Focus management tested with keyboard navigation
        - Scroll trigger works (transparent until 80px)
        - Active link highlighting works as user scrolls page
    
    
    - story_id: "2.2"
      title: "Redesign Hero (mobile-first layout, CTAs, animated dashboard)"
      complexity: L
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement the Hero section with mobile-first stacking (text above dashboard), word-by-word 
        headline animation, primary + secondary CTAs (full-width on mobile), animated dashboard reusing 
        existing AnimatedDashboard component, micro trust row below CTAs. Desktop: 2-column split 
        (text left, dashboard right with glow).
      
      acceptance_criteria:
        - Mobile (375px): above-the-fold content includes badge → headline → subtitle → CTAs (stacked) 
          → AnimatedDashboard (max-width 360px) → micro trust row
        - Desktop (1024px+): hero-inner grid with 1fr 1fr columns; text left, dashboard right with 
          accent-glow shadow; min-height: 100vh
        - Headline animation: word-by-word fadeInUp with 0.1s stagger; subtitle fades at 0.6s; 
          CTAs at 0.75s; dashboard scales at 0.4s
        - Primary CTA "Start Planning — It's Free →" links to app.shtek.me with utm_campaign=hero
        - Secondary CTA "See How It Works" smooth-scrolls to #how-it-works
        - AnimatedDashboard renders correctly at 375px without clipping or overflow
        - Micro trust row: 3 items separated by · (Shtek, Free, Made in Serbia)
      
      blockers: []
      
      dependencies:
        - "1.1, 1.2, 1.3, 1.4 (tokens, Button component, grid, animations)"
      
      definition_of_done:
        - Hero renders without overflow at all viewports
        - Animations play correctly (test prefers-reduced-motion too)
        - AnimatedDashboard mobile performance tested (LCP <2.5s)
        - Both CTA links verified
        - Smooth scroll to #how-it-works works
    
    
    - story_id: "2.3"
      title: "Redesign TrustBar (stat count-up animations, 2×2 mobile grid)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement TrustBar with 4 stat items (beta users, zero tracking, EUR+RSD, Free) that count-up 
        animate on scroll entry. Mobile: 2×2 grid. Desktop: single flex row. Each item: icon box 
        (44×44, bg-card border) + monospace stat value + label. Background: bg-elevated with borders.
      
      acceptance_criteria:
        - 4 stat items render with icon containers 44×44px
        - Count-up animation: values animate from 0 to target over 0.8s ease-out
        - Stagger delay: 0.15s between each item
        - Mobile (375px): 2×2 grid layout
        - Desktop (768px+): single flex row, all items visible
        - Icons use icon boxes: bg-card background, --border-default border, 44×44px
        - Stat values use DM Mono font (monospace, 600 weight)
        - Labels: 0.8rem text-muted color
        - Section background: bg-elevated with top/bottom borders
        - Contrast ratios meet ≥4.5:1
      
      blockers:
        - Q2: Current user count for "500+" stat (or omit if unknown)
      
      dependencies:
        - "1.1, 1.2, 1.4 (tokens, Badge/Card components, useCountUp hook)"
      
      definition_of_done:
        - Count-up animations trigger when section enters viewport
        - All stat items render in correct grid at all viewport sizes
        - No horizontal overflow at 375px
        - Monospace font weight and contrast verified
    
    
    - story_id: "2.4"
      title: "Redesign Features section (mobile tab scroll, feature mocks)"
      complexity: L
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement Features section with horizontal scrollable pill tabs on mobile, tab fadeIn/out panel 
        transitions, feature mock components (Dashboard, Daily Log, Budget, Goals, Ideal Life) that render 
        at 375px without overflow. Mobile: mock ABOVE feature text. Desktop: 2-column (text left, mock right). 
        Tab bar: scroll-snap, auto-scroll active tab into view, right-edge fade gradient. Add "Try It Free →" 
        CTA below feature panel.
      
      acceptance_criteria:
        - Mobile (375px): horizontal scrollable pill tab bar with no wrapping; tabs 44px minimum height; 
          right-edge fade gradient indicating overflow
        - Tab bar: scroll-snap enabled; active tab centered in view on selection
        - Active tab styling: --accent-dim background, --accent border, --accent text
        - Feature mock visual appears FIRST (above text) on mobile
        - Panel content fades in over 0.3s on tab change
        - All 5 feature mock components (Dashboard, DailyLog, Budget, Goals, IdealLife) render 
          correctly at 375px without horizontal overflow or broken layout
        - Desktop (1024px+): 2-column layout (text left, mock right)
        - "Try It Free →" CTA links to app.shtek.me with utm_campaign=features
        - Keyboard navigation: Tab/Enter/Arrow keys navigate between tabs
      
      blockers: []
      
      dependencies:
        - "1.1, 1.2, 1.3, 1.4 (tokens, Button/Card/Section components, responsive grid, animations)"
      
      definition_of_done:
        - Tab bar scrolls and snaps correctly
        - All feature mocks render without overflow at 375px
        - Tab transitions animate smoothly (0.3s fade)
        - Keyboard navigation works
        - CTA link verified
  
  definition_of_done:
    - All 4 stories merged to main
    - No console errors
    - Mobile-first layout verified at 375px, 768px, 1024px, 1440px
    - All CTAs tested (links open correct URLs)
    - Accessibility baseline: keyboard nav + focus indicators visible
    - Ready for Sprint 3

---
