# SPRINT 6: Performance & Polish (Epic 4)
# ══════════════════════════════════════════════════════════════════════════════════════════════════════════════

sprint_6:
  name: "Performance & Polish (Lighthouse, SEO, A11y, Cross-browser)"
  epic: "Epic 4"
  goal: |
    Optimize assets, SEO, and accessibility to meet Lighthouse targets (≥90 mobile, ≥95 desktop), 
    ensure WCAG 2.1 AA compliance, validate cross-browser functionality, and prepare for launch 
    with comprehensive auditing.
  
  sprint_duration: "2 weeks"
  velocity_target: 20 points (3S + 1M)
  
  stories:
    
    - story_id: "4.1"
      title: "Image optimization (WebP, lazy loading, CLS prevention)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Audit all images added during redesign and optimize: convert raster assets to WebP with JPEG 
        fallback via <picture> elements, add loading="lazy" to below-fold images, set explicit 
        width/height attributes to prevent CLS.
      
      acceptance_criteria:
        - All raster images (founder photo, etc.) convert to WebP with JPEG fallback
        - Images below the fold have loading="lazy" attribute
        - All images have explicit width and height attributes
        - No CLS from images (CLS <0.1 contribution from images)
        - All images have meaningful alt text (or alt="" if purely decorative)
        - Network panel confirms images below fold are not loaded until scroll
      
      blockers: []
      
      dependencies:
        - Epics 2 & 3 complete (all images in place)
      
      definition_of_done:
        - All images optimized and tested
        - No CLS regression
        - Network waterfall verified
    
    
    - story_id: "4.2"
      title: "SEO (meta tags, structured data, sitemap, robots.txt)"
      complexity: S
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Implement page-level SEO: update meta tags (title, description, OG tags, canonical), 
        verify heading hierarchy (one H1, H2/H3 for sections), generate/validate sitemap.xml, 
        create robots.txt, validate FAQPage JSON-LD schema from Story 3.3.
      
      acceptance_criteria:
        - <title>: "Shtek — Personal Finance Planning App for Serbia & Balkans"
        - <meta name="description">: 140-155 chars, mentions Serbia, EUR/RSD, free
        - <meta property="og:title">, og:description, og:image all present
        - <link rel="canonical" href="https://shtek.me/">
        - Heading hierarchy: exactly one H1 (hero headline), H2 for section titles, H3 for card/item titles
        - No skipped heading levels
        - sitemap.xml present at /sitemap.xml (valid XML, includes shtek.me)
        - robots.txt present at /robots.txt (allows crawlers, includes Sitemap: line)
        - FAQPage JSON-LD schema from Story 3.3 validated with Google Rich Results Test (passes)
        - Copyright year consistent: © 2026 Shtek (everywhere)
      
      blockers: []
      
      dependencies:
        - Story 3.3 (FAQPage schema must exist)
      
      definition_of_done:
        - Meta tags verified in browser source
        - Heading hierarchy valid (tools: axe, Lighthouse)
        - Sitemap and robots.txt deploy correctly
        - FAQPage schema validated with Google
    
    
    - story_id: "4.3"
      title: "Lighthouse optimization (target ≥90 mobile, ≥95 desktop)"
      complexity: M
      priority: P0
      status: todo
      owner: ""
      
      description: |
        Run Lighthouse CI against deployed/preview site and fix Performance, Accessibility, 
        Best Practices, SEO issues blocking target scores. Compare against baseline captured in 
        Story 0.1. Optimize LCP (hero headline must render <2.5s), eliminate CLS, ensure font-display: swap, 
        fix render-blocking resources.
      
      acceptance_criteria:
        - Lighthouse Mobile: Performance ≥90, Accessibility ≥90, Best Practices ≥90, SEO ≥90
        - Lighthouse Desktop: Performance ≥95, Accessibility ≥90, Best Practices ≥90, SEO ≥95
        - Core Web Vitals: LCP <2.5s mobile, CLS <0.1, FID/INP in "Good" range
        - font-display: swap confirmed on DM Sans and DM Mono
        - No render-blocking fonts (WOFF2 files preloaded or async)
        - No render-blocking CSS files
        - No console errors or warnings
        - Post-launch deltas measurable (baseline from Story 0.1 available)
      
      blockers: []
      
      dependencies:
        - Epics 2 & 3 complete, Stories 4.1 & 4.2 complete
        - Story 0.1 baseline must exist
      
      definition_of_done:
        - All Lighthouse targets met
        - Core Web Vitals green
        - No blocker issues
    
    
    - story_id: "4.4"
      title: "Cross-browser testing (Chrome, Firefox, Safari, iOS Safari, Android Chrome)"
      complexity: M
      priority: P1
      status: todo
      owner: ""
      
      description: |
        Execute structured cross-browser test pass across all target browsers. Test matrix: Chrome 100+, 
        Edge 100+, Firefox 100+, Safari 15+, iOS Safari 15+ (iPhone), Android Chrome 100+. Test: all 
        section layouts, hamburger menu, FAQ accordion, feature tabs, animations, CTAs. Document results 
        and fix critical failures.
      
      acceptance_criteria:
        - Chrome 100+: all sections, interactions, CTAs functional
        - Firefox 100+: hamburger menu, FAQ, feature tabs work; backdrop-filter degrades gracefully
        - Safari 15+: all layouts, sticky navbar, smooth scroll work
        - iOS Safari 15+: hamburger menu, touch targets ≥44px, no zoom on input, 
          horizontal scroll components work with touch
        - Android Chrome 100+: equivalent to iOS Safari expectations
        - Cross-browser test matrix documented (tested browsers + tested interactions + results)
        - No critical layout breaks or non-functional interactions
        - Pixel-perfect parity not required — functional equivalence only
      
      blockers: []
      
      dependencies:
        - Epics 2 & 3 complete (all sections in place)
      
      definition_of_done:
        - Test matrix completed and documented
        - No critical failures (functional issues marked as pass)
        - Result report stored in BRAIN/testing/
    
    
    - story_id: "4.5"
      title: "Accessibility audit (WCAG 2.1 AA, keyboard nav, focus indicators, ARIA)"
      complexity: M
      priority: P1
      status: todo
      owner: ""
      
      description: |
        Execute formal WCAG 2.1 AA accessibility audit using axe DevTools + manual keyboard navigation 
        testing. Audit: color contrast, keyboard navigation order, focus visibility, ARIA labels, 
        semantic HTML, screen reader output for key interactions (hamburger menu, FAQ accordion, feature 
        tabs). Fix all critical (A) and major (AA) issues.
      
      acceptance_criteria:
        - axe DevTools: zero critical violations, zero serious violations
        - Moderate violations documented and assessed (not ignored)
        - Keyboard navigation: all interactive elements reachable via Tab (logical order)
        - Focus indicators: visible on every focused element (:focus-visible ring using --border-focus)
        - Hamburger menu: opens with Enter/Space, closes with Escape, focus trapped when open
        - FAQ accordion: opens/closes with Enter/Space, aria-expanded set correctly, aria-controls points to answer
        - Feature tabs: keyboard navigable with Tab/Arrow/Enter
        - Screen reader (NVDA/VoiceOver): section landmarks announced, AnimatedDashboard has aria-hidden="true"
        - CTA buttons: descriptive text (not "Click Here")
        - Text contrast: body text (--text-primary on --bg-base) ≥4.5:1; 
          muted text (--text-muted on --bg-base) ≥4.5:1
        - --text-dim: only on decorative/non-informative content
        - prefers-reduced-motion: reduce disables all animations or keeps ≤100ms
        - Skip link present and functional: <a href="#main-content" class="skip-link">
      
      blockers: []
      
      dependencies:
        - Epics 2 & 3 complete (all sections in place)
      
      definition_of_done:
        - axe audit results exported (zero critical/serious violations)
        - Keyboard navigation test matrix completed
        - Screen reader output verified
        - Skip link tested
        - Contrast ratios validated
        - prefers-reduced-motion tested (OS setting + verified no animations)
  
  definition_of_done:
    - All 5 stories merged to main
    - Lighthouse targets achieved
    - Cross-browser testing complete
    - Accessibility audit passed
    - Site ready for launch
    - Post-launch metrics baseline captured and ready for comparison

